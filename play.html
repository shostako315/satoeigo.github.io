<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Maestro | 音符をよけろ!</title>
  <meta name="description" content="五線譜の上をジャンプ!音符をすり抜ける中毒性バツグンの音楽ゲーム。">
  <meta property="og:title" content="Flappy Maestro - 五線譜ジャンプゲーム">
  <meta property="og:description" content="タップで跳んで音符をすり抜けろ!あなたは何小節生き残れる?">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #fdf6e3; overflow: hidden; height: 100vh; font-family: 'Montserrat', sans-serif; }
    canvas { display: block; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; transition: opacity 0.5s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .start-overlay { background: rgba(253,246,227,0.95); }

    .game-title {
      font-size: 3rem; font-weight: 900; color: #2c3e50; letter-spacing: 2px; margin-bottom: 5px;
    }
    .game-sub { font-size: 1rem; color: #8e44ad; margin-bottom: 30px; font-weight: 700; letter-spacing: 1px; }

    .instructions {
      display: flex; gap: 30px; margin-bottom: 35px;
    }
    .inst-item { text-align: center; max-width: 130px; }
    .inst-icon { font-size: 2.5rem; margin-bottom: 6px; }
    .inst-text { font-size: 0.75rem; color: #555; line-height: 1.4; }

    .play-btn {
      padding: 16px 60px; font-size: 1.2rem; font-weight: 900; color: #fff;
      background: #8e44ad; border: none; border-radius: 50px; cursor: pointer;
      letter-spacing: 3px; box-shadow: 0 4px 20px rgba(142,68,173,0.3);
      transition: all 0.2s;
    }
    .play-btn:hover { transform: scale(1.05); }
    .play-btn:active { transform: scale(0.98); }

    .gameover-overlay { background: rgba(44,62,80,0.92); }
    .go-title { font-size: 2rem; font-weight: 900; color: #e74c3c; margin-bottom: 20px; letter-spacing: 2px; }
    .go-score { font-size: 5rem; font-weight: 900; color: #fff; line-height: 1; }
    .go-label { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; letter-spacing: 2px; }
    .go-best { font-size: 1rem; color: rgba(255,255,255,0.4); margin-bottom: 25px; }
    .go-credit { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-bottom: 4px; letter-spacing: 1px; }
    .go-name { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 2px; margin-bottom: 3px; }
    .go-role { font-size: 0.8rem; color: rgba(255,255,255,0.4); font-style: italic; margin-bottom: 20px; }
    .go-buttons { display: flex; gap: 12px; }
    .go-buttons button, .go-buttons a {
      padding: 12px 30px; font-size: 0.9rem; font-weight: 700; border-radius: 30px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.2s; text-decoration: none; border: none;
    }
    .btn-retry { background: #8e44ad; color: #fff; }
    .btn-site { background: transparent; border: 2px solid #8e44ad !important; color: #c39bd3; }
    .btn-retry:hover, .btn-site:hover { transform: translateY(-2px); }

    .score-hud {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      font-size: 2.5rem; font-weight: 900; color: #2c3e50; z-index: 5;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
      display: none;
    }
    .score-hud.active { display: block; }

    @media (max-width: 500px) {
      .game-title { font-size: 2rem; }
      .instructions { gap: 15px; }
      .inst-icon { font-size: 2rem; }
      .go-score { font-size: 3.5rem; }
      .go-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="score-hud" id="scoreHud">0</div>

<div class="overlay start-overlay" id="startScreen">
  <div class="game-title">Flappy Maestro</div>
  <div class="game-sub">五線譜の音符をすり抜けろ!</div>
  <div class="instructions">
    <div class="inst-item">
      <div class="inst-icon">&#127925;</div>
      <div class="inst-text">五線譜の上を<br>指揮者が走る</div>
    </div>
    <div class="inst-item">
      <div class="inst-icon">&#128070;</div>
      <div class="inst-text">タップ or クリックで<br>ジャンプ!</div>
    </div>
    <div class="inst-item">
      <div class="inst-icon">&#127932;</div>
      <div class="inst-text">音符の隙間を<br>すり抜けよう</div>
    </div>
  </div>
  <button class="play-btn" id="playBtn">PLAY</button>
</div>

<div class="overlay hidden gameover-overlay" id="gameoverScreen">
  <div class="go-title">GAME OVER</div>
  <div class="go-label">SCORE</div>
  <div class="go-score" id="goScore">0</div>
  <div class="go-best" id="goBest"></div>
  <div class="go-credit">This game was created by</div>
  <div class="go-name">佐藤 瑛吾 / Eigo Sato</div>
  <div class="go-role">Violinist & Conductor</div>
  <div class="go-buttons">
    <button class="btn-retry" id="retryBtn">RETRY</button>
    <a class="btn-site" href="index.html">Official Site</a>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');

  var W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Game state ----
  var STATE = 'menu'; // menu, playing, dead
  var score = 0;
  var bestScore = parseInt(localStorage.getItem('flappyMaestroBest') || '0');
  var frameCount = 0;

  // ---- Staff lines ----
  var staffTop, staffBottom, lineGap;
  function calcStaff() {
    staffTop = H * 0.25;
    staffBottom = H * 0.75;
    lineGap = (staffBottom - staffTop) / 4;
  }
  calcStaff();
  window.addEventListener('resize', calcStaff);

  // ---- Player (conductor) ----
  var player = {
    x: 80,
    y: H / 2,
    vy: 0,
    size: 22,
    jumpPower: -8,
    gravity: 0.38,
    rotation: 0
  };

  // ---- Obstacles (musical notes) ----
  var obstacles = [];
  var obstacleSpeed = 3.5;
  var spawnTimer = 0;
  var spawnInterval = 90; // frames
  var gapSize = 2.2; // in lineGaps

  function spawnObstacle() {
    // gap position: which staff position is the gap centered on
    // Staff has 5 lines (0-4), gaps between/above/below
    var positions = [];
    for (var i = -1; i <= 5; i += 0.5) {
      positions.push(i);
    }
    var gapCenter = positions[Math.floor(Math.random() * positions.length)];
    var gapTop = staffTop + (gapCenter - gapSize / 2) * lineGap;
    var gapBottom = staffTop + (gapCenter + gapSize / 2) * lineGap;

    // Clamp
    if (gapTop < staffTop - lineGap * 1.5) gapTop = staffTop - lineGap * 1.5;
    if (gapBottom > staffBottom + lineGap * 1.5) gapBottom = staffBottom + lineGap * 1.5;

    // Note type: whole, half, quarter (visual only)
    var noteTypes = ['whole', 'half', 'quarter'];
    var noteType = noteTypes[Math.floor(Math.random() * noteTypes.length)];

    obstacles.push({
      x: W + 40,
      gapTop: gapTop,
      gapBottom: gapBottom,
      width: 50,
      passed: false,
      noteType: noteType
    });
  }

  // ---- Drawing ----
  function drawStaffLines() {
    ctx.strokeStyle = 'rgba(44, 62, 80, 0.15)';
    ctx.lineWidth = 1.5;
    for (var i = 0; i < 5; i++) {
      var y = staffTop + i * lineGap;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);

    // Body (circle)
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    ctx.arc(0, 0, player.size, 0, Math.PI * 2);
    ctx.fill();

    // Face
    ctx.fillStyle = '#fdf6e3';
    ctx.beginPath();
    ctx.arc(0, -2, player.size * 0.65, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    ctx.arc(-5, -5, 2.5, 0, Math.PI * 2);
    ctx.arc(5, -5, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Baton (arm)
    ctx.strokeStyle = '#8e44ad';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(player.size * 0.6, -player.size * 0.3);
    var batonAngle = Math.sin(frameCount * 0.15) * 0.4;
    ctx.lineTo(player.size * 0.6 + Math.cos(batonAngle) * 25, -player.size * 0.3 - Math.sin(batonAngle) * 25);
    ctx.stroke();

    // Baton tip
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(
      player.size * 0.6 + Math.cos(batonAngle) * 25,
      -player.size * 0.3 - Math.sin(batonAngle) * 25,
      3, 0, Math.PI * 2
    );
    ctx.fill();

    ctx.restore();
  }

  function drawNote(obs) {
    var cx = obs.x + obs.width / 2;

    // Top note cluster (above gap)
    drawNoteHead(cx, obs.gapTop - 15, obs.noteType, true);
    // Stem going up
    ctx.strokeStyle = 'rgba(44, 62, 80, 0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + 10, obs.gapTop - 15);
    ctx.lineTo(cx + 10, obs.gapTop - 60);
    ctx.stroke();

    // Bottom note cluster (below gap)
    drawNoteHead(cx, obs.gapBottom + 15, obs.noteType, false);
    // Stem going down
    ctx.beginPath();
    ctx.moveTo(cx - 10, obs.gapBottom + 15);
    ctx.lineTo(cx - 10, obs.gapBottom + 60);
    ctx.stroke();

    // Collision bars (subtle visual indicator)
    ctx.fillStyle = 'rgba(142, 68, 173, 0.08)';
    ctx.fillRect(obs.x, 0, obs.width, obs.gapTop);
    ctx.fillRect(obs.x, obs.gapBottom, obs.width, H - obs.gapBottom);
  }

  function drawNoteHead(x, y, type, filled) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-0.2);
    ctx.fillStyle = filled ? 'rgba(44, 62, 80, 0.7)' : 'rgba(44, 62, 80, 0.4)';
    ctx.strokeStyle = 'rgba(44, 62, 80, 0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI * 2);
    if (type === 'whole') {
      ctx.stroke();
    } else {
      ctx.fill();
    }
    ctx.restore();
  }

  // ---- Particles ----
  var particles = [];
  function emitParticles(x, y) {
    for (var i = 0; i < 6; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 1,
        size: 3 + Math.random() * 4,
        color: ['#8e44ad', '#c39bd3', '#e8d5f0', '#d7bde2'][Math.floor(Math.random() * 4)]
      });
    }
  }

  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.03;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ---- Score popup ----
  var scorePopups = [];
  function addScorePopup(x, y) {
    scorePopups.push({ x: x, y: y, life: 1, text: '+1' });
  }
  function drawScorePopups() {
    for (var i = scorePopups.length - 1; i >= 0; i--) {
      var sp = scorePopups[i];
      sp.y -= 1.5;
      sp.life -= 0.025;
      if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
      ctx.globalAlpha = sp.life;
      ctx.fillStyle = '#8e44ad';
      ctx.font = '900 20px Montserrat';
      ctx.textAlign = 'center';
      ctx.fillText(sp.text, sp.x, sp.y);
    }
    ctx.globalAlpha = 1;
  }

  // ---- Collision ----
  function checkCollision(obs) {
    var px = player.x;
    var py = player.y;
    var pr = player.size - 4; // slight forgiveness

    // Check if player X overlaps obstacle
    if (px + pr > obs.x && px - pr < obs.x + obs.width) {
      // Check if player is outside the gap
      if (py - pr < obs.gapTop || py + pr > obs.gapBottom) {
        return true;
      }
    }
    return false;
  }

  // ---- Game loop ----
  function jump() {
    if (STATE !== 'playing') return;
    player.vy = player.jumpPower;
    emitParticles(player.x - 10, player.y + player.size);
  }

  function startGame() {
    STATE = 'playing';
    score = 0;
    frameCount = 0;
    obstacles = [];
    particles = [];
    scorePopups = [];
    spawnTimer = 0;
    player.y = H / 2;
    player.vy = 0;
    player.rotation = 0;
    obstacleSpeed = 3.5;
    spawnInterval = 90;
    gapSize = 2.2;

    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameoverScreen').classList.add('hidden');
    document.getElementById('scoreHud').classList.add('active');
    document.getElementById('scoreHud').textContent = '0';
  }

  function die() {
    STATE = 'dead';
    document.getElementById('scoreHud').classList.remove('active');

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('flappyMaestroBest', bestScore);
    }

    document.getElementById('goScore').textContent = score;
    document.getElementById('goBest').textContent = 'BEST: ' + bestScore;

    setTimeout(function() {
      document.getElementById('gameoverScreen').classList.remove('hidden');
    }, 500);
  }

  function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);

    // Background gradient
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#fdf6e3');
    grad.addColorStop(1, '#f5e6d3');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    drawStaffLines();

    if (STATE === 'playing') {
      frameCount++;

      // Gravity
      player.vy += player.gravity;
      player.y += player.vy;
      player.rotation = Math.min(player.vy * 0.04, 0.5);

      // Bounds
      if (player.y - player.size < 0) {
        player.y = player.size;
        player.vy = 0;
      }
      if (player.y + player.size > H) {
        die();
      }

      // Spawn obstacles
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnObstacle();
        spawnTimer = 0;
      }

      // Difficulty ramp
      if (frameCount % 300 === 0) {
        obstacleSpeed = Math.min(obstacleSpeed + 0.3, 7);
        spawnInterval = Math.max(spawnInterval - 5, 50);
        if (gapSize > 1.6) gapSize -= 0.05;
      }

      // Update obstacles
      for (var i = obstacles.length - 1; i >= 0; i--) {
        var obs = obstacles[i];
        obs.x -= obstacleSpeed;

        drawNote(obs);

        // Collision
        if (checkCollision(obs)) {
          die();
          break;
        }

        // Score
        if (!obs.passed && obs.x + obs.width < player.x) {
          obs.passed = true;
          score++;
          document.getElementById('scoreHud').textContent = score;
          addScorePopup(player.x + 30, player.y - 20);
          emitParticles(player.x, player.y);
        }

        // Remove off-screen
        if (obs.x + obs.width < -50) {
          obstacles.splice(i, 1);
        }
      }
    }

    // Draw obstacles when dead too (frozen)
    if (STATE === 'dead') {
      for (var j = 0; j < obstacles.length; j++) {
        drawNote(obstacles[j]);
      }
    }

    // Always draw player
    if (STATE === 'playing' || STATE === 'dead') {
      drawPlayer();
    }

    // Menu idle animation
    if (STATE === 'menu') {
      player.y = H / 2 + Math.sin(Date.now() * 0.003) * 20;
      player.rotation = 0;
      frameCount++;
      drawPlayer();
    }

    updateParticles();
    drawScorePopups();
  }

  loop();

  // ---- Input ----
  function handleInput(e) {
    if (e) e.preventDefault();
    if (STATE === 'playing') {
      jump();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      handleInput(e);
    }
  });

  canvas.addEventListener('mousedown', handleInput);
  canvas.addEventListener('touchstart', handleInput, { passive: false });

  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

})();
</script>
</body>
</html>
